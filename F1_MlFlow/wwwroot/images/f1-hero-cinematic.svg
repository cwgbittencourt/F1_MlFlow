<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#05070d"/>
    </linearGradient>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#94a3b8" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#e2e8f0" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="carRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="540" fill="url(#bg)"/>

  <path d="M 60 430 C 220 280 440 240 820 120" stroke="url(#track)" stroke-width="28" stroke-linecap="round" opacity="0.6"/>
  <path d="M 90 440 C 240 300 460 260 790 150" stroke="#f8fafc" stroke-width="3" stroke-dasharray="12 14" opacity="0.5"/>

  <g opacity="0.35">
    <path d="M 120 340 L 260 300" stroke="#7dd3fc" stroke-width="2"/>
    <path d="M 200 380 L 320 330" stroke="#f97316" stroke-width="2"/>
    <path d="M 320 260 L 440 220" stroke="#7dd3fc" stroke-width="2"/>
  </g>

  <g id="f1car">
    <rect x="40" y="150" width="220" height="26" rx="10" fill="#111827" stroke="#1f2937"/>
    <rect x="80" y="26" width="140" height="12" rx="6" fill="#111827" stroke="#1f2937"/>
    <path d="M 120 40 L 180 40 L 230 150 L 70 150 Z" fill="url(#carRed)"/>
    <rect x="95" y="60" width="110" height="70" rx="24" fill="#0b1220" stroke="#1f2937"/>
    <rect x="70" y="90" width="160" height="50" rx="20" fill="#111827"/>
    <rect x="55" y="120" width="190" height="20" rx="10" fill="#1f2937"/>
    <circle cx="40" cy="170" r="28" fill="#0b1220" stroke="#334155"/>
    <circle cx="260" cy="170" r="28" fill="#0b1220" stroke="#334155"/>
    <circle cx="40" cy="170" r="12" fill="#94a3b8"/>
    <circle cx="260" cy="170" r="12" fill="#94a3b8"/>
    <path d="M 70 170 L 230 170" stroke="#475569" stroke-width="6"/>
  </g>

  <g opacity="0.5">
    <use href="#f1car" transform="translate(160 250) scale(0.55) rotate(-12)"/>
    <use href="#f1car" transform="translate(80 310) scale(0.4) rotate(-16)"/>
  </g>

  <g filter="url(#glow)">
    <use href="#f1car" transform="translate(420 180) rotate(-8)"/>
  </g>

  <ellipse cx="540" cy="380" rx="160" ry="20" fill="#020308" opacity="0.6"/>
  <ellipse cx="280" cy="420" rx="100" ry="12" fill="#020308" opacity="0.4"/>
</svg>
